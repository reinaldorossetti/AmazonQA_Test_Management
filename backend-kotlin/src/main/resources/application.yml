spring:
  application:
    name: backend-kotlin
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:amazonqa}
    username: ${POSTGRES_USER:amazonqa}
    password: '${POSTGRES_PASSWORD:AmazonQA@2026!#}'
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  error:
    include-message: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

seed:
  enabled: ${SEED_DATA_ENABLED:false}
  reset-on-startup: ${SEED_RESET_DB:false}
  strict-validation: ${SEED_STRICT_VALIDATION:true}
