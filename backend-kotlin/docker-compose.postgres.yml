services:
  postgres:
    image: postgres:17.9
    container_name: amazonqa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amazonqa}
      POSTGRES_USER: ${POSTGRES_USER:-amazonqa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amazonqa_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amazonqa} -d ${POSTGRES_DB:-amazonqa}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${POSTGRES_DATA_DIR:-G:/AmazonQA_Test_Management/postgres-data}:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/01-V1__init.sql:ro
