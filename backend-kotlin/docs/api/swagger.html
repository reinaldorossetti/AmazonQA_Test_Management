<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon QA API - Swagger UI</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: #fafafa;
      }

      .topbar {
        padding: 14px 20px;
        background: #111827;
        color: #f9fafb;
        border-bottom: 1px solid #1f2937;
      }

      .topbar h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .topbar p {
        margin: 4px 0 0;
        color: #d1d5db;
        font-size: 12px;
      }

      #swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Amazon QA Backend API — Swagger UI</h1>
      <p>
        Fonte do contrato: <code>docs/api/openapi.yaml</code>. Se abrir este arquivo direto no navegador e não carregar,
        sirva a pasta por HTTP (ex.: Live Server no VS Code).
      </p>
    </div>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = () => {
        SwaggerUIBundle({
          url: './openapi.yaml',
          dom_id: '#swagger-ui',
          deepLinking: true,
          docExpansion: 'list',
          persistAuthorization: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'StandaloneLayout',
        });
      };
    </script>
  </body>
</html>
