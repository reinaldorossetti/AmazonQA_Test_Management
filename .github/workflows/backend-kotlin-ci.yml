name: Backend Kotlin CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend-kotlin/**"
      - ".github/workflows/backend-kotlin-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend-kotlin/**"
      - ".github/workflows/backend-kotlin-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-reports"
  cancel-in-progress: true

jobs:
  build-seed-test:
    name: Build + DB + Seed + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.9
        env:
          POSTGRES_DB: amazonqa
          POSTGRES_USER: amazonqa
          POSTGRES_PASSWORD: "AmazonQA@2026!#"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amazonqa -d amazonqa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_DB: amazonqa
      POSTGRES_USER: amazonqa
      POSTGRES_PASSWORD: "AmazonQA@2026!#"
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew
        working-directory: backend-kotlin

      - name: Build project (without tests)
        run: ./gradlew --no-daemon clean assemble
        working-directory: backend-kotlin

      - name: Run Flyway + Seed (startup runner)
        timeout-minutes: 5
        env:
          SEED_DATA_ENABLED: "true"
          SEED_RESET_DB: "true"
          SEED_STRICT_VALIDATION: "true"
        run: >-
          ./gradlew --no-daemon bootRun
          --args="--spring.main.web-application-type=none --server.port=0"
        working-directory: backend-kotlin

      - name: Run unit tests (non-API)
        run: ./gradlew --no-daemon unitTest
        working-directory: backend-kotlin

      - name: Run API tests + generate Allure report
        run: ./gradlew --no-daemon apiAllureReport
        working-directory: backend-kotlin

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-kotlin-test-reports
          path: |
            backend-kotlin/build/reports/tests/
            backend-kotlin/build/test-results/

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-kotlin-allure-report
          path: backend-kotlin/build/reports/allure-report/allureReport/

      - name: Prepare reports bundle (hub + API + unit)
        if: always() && github.event_name == 'push'
        run: |
          rm -rf tests-report
          mkdir -p tests-report/api
          mkdir -p tests-report/unit

          cp backend-kotlin/docs/api/test-reports-hub.html tests-report/index.html
          cp -r backend-kotlin/build/reports/allure-report/allureReport/. tests-report/api/
          cp -r backend-kotlin/build/reports/tests/unitTest/. tests-report/unit/

      - name: Upload reports bundle artifact
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-kotlin-gh-pages-bundle
          path: tests-report/

      - name: Deploy Test reports to gh-pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: tests-report
          destination_dir: tests-report
          keep_files: true
